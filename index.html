<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugende Express | Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* MAIN DASHBOARD TABLE - FULL SCREEN, NO GAPS */
        .dashboard {
            width: 100%;
            height: 100%;
            table-layout: fixed;
            border-collapse: collapse;
        }

        /* LEFT COLUMN - HOME PAGE */
        .left-col {
            width: 72%;
            background: white;
            vertical-align: top;
        }

        .home-frame-cell {
            width: 100%;
            height: 100%;
            vertical-align: top;
            padding: 0;
        }

        .home-frame-cell iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* RIGHT COLUMN - LOGIN PANEL */
        .right-col {
            width: 28%;
            background: #f5f5f5;
            vertical-align: top;
            border-left: 1px solid #ddd;
        }

        /* SIDE HEADER - keeping original style */
        .side-header {
            background: #e8e8e8;
            padding: 20px 20px 15px 20px;
            text-align: center;
            border-bottom: 1px solid #ccc;
        }

        .side-header span {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #333;
        }

        /* SWITCH BUTTONS - original style */
        .switch-group {
            padding: 20px 20px 10px 20px;
            display: flex;
            gap: 12px;
            justify-content: center;
            background: #f5f5f5;
        }

        .switch-group a {
            flex: 1;
            text-align: center;
            text-decoration: none;
            padding: 8px 12px;
            font-weight: 600;
            font-size: 13px;
            border-radius: 4px;
            background: #ddd;
            color: #333;
            transition: all 0.2s ease;
            border: 1px solid #bbb;
        }

        .switch-group a:first-child {
            background: #4a6fa5;
            color: white;
            border-color: #3a5a8a;
        }

        .switch-group a:last-child {
            background: #6b5b4a;
            color: white;
            border-color: #5a4a3a;
        }

        .switch-group a:hover {
            opacity: 0.85;
        }

        /* LOGIN IFRAME */
        .login-frame-cell {
            padding: 10px 10px 10px 10px;
            background: #f5f5f5;
        }

        .login-frame-cell iframe {
            width: 100%;
            height: 375px;
            border: 1px solid #ccc;
            background: white;
            border-radius: 4px;
        }

        /* QUICK GUIDE - original simple style */
        .info-note {
            padding: 0px 0px 0px 0px;
            background: #f5f5f5;
            color: #444;
            font-size: 12px;
            line-height: 1.6;
            border-top: 1px solid #ddd;
        }

        .info-note b {
            color: #4a6fa5;
            font-size: 13px;
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

<table class="dashboard" cellpadding="0" cellspacing="0">
    <tr>
        <!-- LEFT COLUMN - HOME PAGE -->
        <td class="left-col">
            <table style="width:100%; height:100%;" cellpadding="0" cellspacing="0">
                <tr>
                    <td class="home-frame-cell">
                        <iframe 
                            src="home.html" 
                            title="Bus Schedule & Information"
                            frameborder="0"
                            scrolling="yes">
                        </iframe>
                    </td>
                </tr>
            </table>
        </td>

        <!-- RIGHT COLUMN - LOGIN PANEL -->
        <td class="right-col">
            <table style="width:100%; height:100%;" cellpadding="0" cellspacing="0">
               
                <tr>
                    <td class="switch-group">
                        <a href="user_login.html" target="authFrame">USER LOGIN</a>
                        <a href="admin.html" target="authFrame">ADMIN LOGIN</a>
                    </td>
                </tr>
                <tr>
                    <td class="login-frame-cell">
                        <iframe 
                            name="authFrame"
                            id="authFrame"
                            src="user_login.html"
                            frameborder="0"
                            scrolling="no">
                        </iframe>
                    </td>
                </tr>
                <tr style="height:30%;">
                    <td class="info-note">
                      <iframe src="https://time.is/kigali"
        width="100%" 
        height="100%" 
        scrolling="no" 
        style="border:none; overflow:hidden; display:block; width:100%; height:100%;">
</iframe>

                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>

</body>
</html>
