<!DOCTYPE html>
<html>
<head>

<title>Bus Ticket System - User Login</title>
<link rel="stylesheet" href="styles.css">

</head>
<body style="margin:0; padding:0; background:#F0F0F0; font-family:Segoe UI,Roboto,sans-serif;">

<!-- ==================== COMPACT USER LOGIN PAGE (FITS PERFECTLY IN IFRAME) ==================== -->

<table width="100%" cellpadding="0" cellspacing="0" bgcolor="#F0F0F0">
    
    <!-- TITLE ROW -->
    <tr bgcolor="#003366">
        <td align="center" style="padding:15px 10px;">
            <font size="5" color="white"><b>🔐 USER LOGIN</b></font>
        </td>
    </tr>
    
    <!-- SUBTITLE -->
    <tr bgcolor="#FF9900">
        <td align="center" style="padding:8px;">
            <font size="3"><b>⭐ ACCESS YOUR DASHBOARD ⭐</b></font>
        </td>
    </tr>
    
    <!-- LOGIN FORM (COMPACT, NO EXTRA PADDING) -->
    <tr>
        <td align="center" style="padding:20px 15px;">
            <table border="0" width="100%" cellpadding="8" style="max-width:320px; margin:0 auto; background:#FFF8E7;">
                <form action="dashboard.html" method="get">
                    <tr>
                        <td align="right"><b>📧 Email / Phone:</b></td>
                        <td align="left"><input type="text" name="userid" placeholder="Email or phone" style="padding:6px; width:100%;"></td>
                    </tr>
                    <tr>
                        <td align="right"><b>🔒 Password:</b></td>
                        <td align="left"><input type="password" name="password" placeholder="Password" style="padding:6px; width:100%;"></td>
                    </tr>
                    <tr>
                        <td colspan="2" align="center" style="padding-top:12px;">
                            <input type="submit" value="🔑 LOGIN" style="background:#003366; color:white; font-size:15px; padding:8px 25px; border:none; font-weight:bold; cursor:pointer;">
                            <input type="reset" value="Clear" style="background:#FF9900; color:black; font-size:15px; padding:8px 20px; border:none; font-weight:bold; cursor:pointer; margin-left:10px;">
                        </td>
                    </tr>
                </form>
            </table>
            <div style="margin-top:15px;">
                <font size="2"><i>🔹 Demo: any email / any password</i></font>
            </div>
        </td>
    </tr>
    
    <!-- SPACER -->
    <tr bgcolor="#003366"><td style="height:4px;"></td></tr>
    
    <!-- ADMIN LINK -->
    <tr bgcolor="rgb(255, 240, 230)">
        <td align="center" style="padding:12px;">
            <b>👑 ADMIN ACCESS</b><br>
            <a href="admin.html"><font size="3"><b>➡️ Admin Login Page</b></font></a>
        </td>
    </tr>
    
    <!-- NAVIGATION LINKS -->
    <tr bgcolor="#003366">
        <td align="center" style="padding:10px;">
            <font color="white" size="2">© Tugende Express | Safe Travels</font>
        </td>
    </tr>
</table>

</body>
</html>
